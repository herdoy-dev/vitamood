# GitHub Pages Jekyll config for the VitaMood legal site.
#
# This directory is served at https://herdoydev.github.io/vitamood/
# once GitHub Pages is enabled in the repo settings with source
# set to "Deploy from a branch" → "main" → "/docs".
#
# The site hosts the privacy policy and terms of service at public
# URLs so the Google Play Store listing has something to link to.
# Google Play rejects apps without a public (not in-app) privacy
# policy URL.
#
# Drift rule: legal/*.md is the source of truth. When you edit the
# privacy policy or terms, update the matching file in docs/ in the
# SAME commit, or the hosted version will drift from the bundled
# in-app version. A future improvement is a GitHub Action that
# copies legal/ → docs/ automatically — until then this is manual.

title: VitaMood
description: A calm, non-clinical wellness and mental-health companion.
theme: minima
markdown: kramdown

# Clean URLs — /privacy-policy instead of /privacy-policy.html
permalink: /:title/

# Hide files that shouldn't become pages
exclude:
  - README.md
  - _config.yml
