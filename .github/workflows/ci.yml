name: CI

# Runs on every push to main and on every PR against main.
# No secrets, no deploys, no external services — pure verification.
#
# Four jobs in one workflow so the GitHub Actions UI shows them in
# a single check cluster:
#   - lint: ESLint via `expo lint`
#   - typecheck: `tsc --noEmit` over the RN app (excludes
#                functions/ and __tests__/, both of which have
#                their own tsconfig or jest config)
#   - unit: jest over the safety contract + prompt snapshot tests
#   - rules: jest + Firestore emulator over the rules tests
#
# The rules job installs firebase-tools globally because the
# @firebase/rules-unit-testing SDK needs a running emulator and
# the `emulators:exec` wrapper is the cleanest way to scope its
# lifetime to the jest run.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint (eslint)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - name: Install deps
        run: bun install --frozen-lockfile
      - name: Lint
        run: bun run lint

  typecheck:
    name: Typecheck (tsc)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - name: Install deps
        run: bun install --frozen-lockfile
      - name: TypeScript check
        run: bunx tsc --noEmit

  unit:
    name: Unit tests (safety + prompt snapshot)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - name: Install deps
        run: bun install --frozen-lockfile
      - name: Jest
        run: bun run test

  rules:
    name: Firestore rules tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      # firebase-tools needs a Node runtime for the emulator JVM
      # wrapper + the admin SDK bundled inside it.
      - name: Setup Node (for emulator)
        uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Setup Java (Firestore emulator runtime)
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"
      - name: Install deps
        run: bun install --frozen-lockfile
      - name: Install firebase-tools
        run: npm install -g firebase-tools
      - name: Run rules tests under emulator
        run: bun run test:rules
